name: Setup CI
description: 'Install the toolchain with mise (Node.js + pnpm) and install dependencies with a frozen lockfile (with pnpm store caching)'

runs:
  using: composite
  steps:
    - name: '[Prepare] Setup mise (Node.js + pnpm)'
      uses: jdx/mise-action@v4

    - name: '[Prepare] Resolve pnpm store path'
      shell: bash
      run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

    - name: '[Prepare] Cache pnpm store'
      uses: actions/cache@v5
      with:
        path: ${{ env.PNPM_STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: '[Prepare] Install dependencies'
      shell: bash
      run: pnpm install --frozen-lockfile
